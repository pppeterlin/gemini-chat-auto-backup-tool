<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#F07A5C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Face + ears (single closed path, shape kept like reference) -->
  <path d="
    M 12 30
    C 12 22, 14 18, 18 18
    L 21 8
    L 28 18
    C 30 17, 34 17, 36 18
    L 43 8
    L 46 18
    C 50 18, 52 22, 52 30
    L 52 42
    C 52 52, 44 56, 32 56
    C 20 56, 12 52, 12 42
    Z
  " />

  <!-- Inner ear color blocks -->
  <path d="M20 14 L22 18 L18 18 Z" fill="#F07A5C" stroke="none" />
  <path d="M44 14 L46 18 L42 18 Z" fill="#F07A5C" stroke="none" />

  <!-- Round eyebrows (filled solid circles — signature) -->
  <circle cx="27" cy="26" r="2.6" fill="#F07A5C" stroke="none" />
  <circle cx="37" cy="26" r="2.6" fill="#F07A5C" stroke="none" />
  <!-- Eyes (small black dots, smaller than brows) -->
  <circle cx="26" cy="32" r="1.6" fill="#1A1A1A" stroke="none" />
  <circle cx="38" cy="32" r="1.6" fill="#1A1A1A" stroke="none" />

  <!-- Simplified nose (small filled triangle) -->
  <path d="M30 40 L34 40 L32 43 Z" fill="#F07A5C" stroke="#F07A5C" stroke-width="1.2" />

  <!-- Simple mouth -->
  <path d="M32 43 Q29 46 27 45" />
  <path d="M32 43 Q35 46 37 45" />

  <!-- 2 whiskers per side -->
  <path d="M8 42 L20 41" />
  <path d="M8 47 L20 45" />
  <path d="M56 42 L44 41" />
  <path d="M56 47 L44 45" />
</svg>

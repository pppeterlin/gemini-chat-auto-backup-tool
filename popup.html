<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Chat Backup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #FAFAF7;
      --card:       #FFFFFF;
      --border:     #EAEAE4;
      --border-strong: #D9D9D1;
      --ink:        #1A1A1A;
      --ink-muted:  #6B6B66;
      --ink-faint:  #9A9A94;

      --coral:      #F07A5C;
      --coral-hover:#E26446;
      --coral-tint: #FCE8E1;

      --success:    #3F7A52;
      --success-bg: #E8F0E9;
      --warning:    #A87324;
      --warning-bg: #F6EEDC;
      --danger:     #B8453F;
      --danger-bg:  #F6E1E1;
      --info:       #4A6F8E;
      --info-bg:    #E4ECF3;
    }

    body {
      font-family: 'Inter', 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
      font-size: 13px;
      color: var(--ink);
      background: var(--bg);
      width: 320px;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-icon svg { width: 100%; height: 100%; }
    .header-title h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
      color: var(--ink);
    }
    .header-title p {
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 1px;
    }

    /* ── Body ── */
    .body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Card title ── */
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 12px;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .folder-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }
    .folder-status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 22px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-dot.bound { background: var(--success); }
    .folder-status:has(#folder-name.bound) .status-dot { background: var(--success); }
    #folder-name {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #folder-name.bound { color: var(--ink); }
    /* Badge kept for i18n text, but hidden visually — status-dot replaces it */
    .folder-badge {
      display: none;
    }
    .folder-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    /* ── Rows (flat, no card) ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 28px;
    }
    .row-label {
      font-size: 12px;
      color: var(--ink-muted);
      flex-shrink: 0;
    }
    .row-value {
      font-size: 12px;
      color: var(--ink);
      font-weight: 500;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
      width: 100%;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Primary = the ONE coral CTA */
    .btn-primary {
      background: var(--coral);
      color: #fff;
      border-color: var(--coral);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--coral-hover);
      border-color: var(--coral-hover);
    }

    /* Outline = secondary weight */
    .btn-outline {
      background: var(--card);
      color: var(--ink);
      border: 1px solid var(--border-strong);
    }
    .btn-outline:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--ink-muted);
    }

    /* Ghost = tertiary, lowest weight */
    .btn-ghost {
      background: transparent;
      color: var(--ink-muted);
      border: 1px solid transparent;
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--bg);
      color: var(--ink);
    }

    /* Success (retained for "立即備份" when it's the active state — merged into primary now) */
    .btn-success {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }
    .btn-success:hover:not(:disabled) {
      background: #2F5F3F;
      border-color: #2F5F3F;
    }

    /* ── Select ── */
    select {
      padding: 7px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      color: var(--ink);
      background: var(--card);
      cursor: pointer;
      outline: none;
      min-width: 130px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    select:hover { border-color: var(--ink-muted); }
    select:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px var(--coral-tint);
    }

    /* ── Last backup (inline row) ── */
    .last-backup-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--ink-muted);
    }
    #last-backup-time { color: var(--ink); font-weight: 500; }

    /* ── Status message ── */
    #status-msg {
      font-size: 12px;
      padding: 9px 12px;
      border-radius: 6px;
      display: none;
      line-height: 1.5;
      border: 1px solid transparent;
    }
    #status-msg.success { display: block; background: var(--success-bg); color: var(--success); border-color: #C6DBCC; }
    #status-msg.error   { display: block; background: var(--danger-bg);  color: var(--danger);  border-color: #E8C2C0; }
    #status-msg.info    { display: block; background: var(--info-bg);    color: var(--info);    border-color: #C8D6E2; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Current chat sync ── */
    .sync-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sync-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .sync-badge.never   { background: var(--danger-bg);  color: var(--danger);  border-color: #E8C2C0; }
    .sync-badge.syncing { background: var(--info-bg);    color: var(--info);    border-color: #C8D6E2; }
    .sync-badge.synced  { background: var(--success-bg); color: var(--success); border-color: #C6DBCC; }
    .sync-badge.has-new { background: var(--warning-bg); color: var(--warning); border-color: #E6D4A8; }
    #sync-status-time { font-size: 11px; color: var(--ink-muted); }

    /* ── Full backup progress ── */
    #full-backup-progress { margin-top: 10px; }
    .progress-text {
      font-size: 12px;
      color: var(--ink);
      font-weight: 500;
      margin-bottom: 4px;
    }
    .progress-current {
      font-size: 11px;
      color: var(--ink-faint);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--coral);
      border-radius: 999px;
      transition: width 0.4s ease;
      width: 0%;
    }
    #failed-list { font-size: 11px; color: var(--ink-muted); }
    #failed-list summary {
      cursor: pointer;
      color: var(--danger);
      font-weight: 500;
      user-select: none;
      padding: 2px 0;
    }
    #failed-list ul { margin: 4px 0 0 0; padding-left: 14px; }
    #failed-list li { margin-bottom: 3px; line-height: 1.4; word-break: break-word; }
    #failed-list .fail-reason { color: var(--ink-faint); }

    /* ── History section ── */
    .history-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* ── Language selector ── */
    .lang-selector {
      position: relative;
      display: inline-block;
      margin-left: auto;
    }
    .lang-btn {
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
      transition: all 0.15s;
      width: 30px;
      height: 30px;
    }
    .lang-btn:hover {
      border-color: var(--ink-muted);
      color: var(--ink);
      background: var(--bg);
    }
    .lang-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
      max-height: 340px;
      overflow-y: auto;
      z-index: 1000;
      min-width: 170px;
      display: none;
      margin-top: 6px;
    }
    .lang-dropdown.show { display: block; }
    .lang-option {
      padding: 9px 14px;
      font-size: 12px;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lang-option:hover { background: var(--bg); }
    .lang-option.active {
      background: var(--coral-tint);
      color: var(--coral-hover);
      font-weight: 500;
    }
    .lang-option::before {
      content: '';
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: transparent;
    }
    .lang-option.active::before { background: var(--coral); }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--ink-faint);
      text-align: center;
      letter-spacing: 0.3px;
    }

    /* ── Icon-only mini buttons inside rows ── */
    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .btn-icon svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <!-- Brow-cat mark -->
      <svg viewBox="0 0 64 64" fill="none" stroke="#F07A5C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 12 30 C 12 22, 14 18, 18 18 L 21 8 L 28 18 C 30 17, 34 17, 36 18 L 43 8 L 46 18 C 50 18, 52 22, 52 30 L 52 42 C 52 52, 44 56, 32 56 C 20 56, 12 52, 12 42 Z" />
        <path d="M20 14 L22 18 L18 18 Z" fill="#F07A5C" stroke="none" />
        <path d="M44 14 L46 18 L42 18 Z" fill="#F07A5C" stroke="none" />
        <circle cx="27" cy="26" r="2.6" fill="#F07A5C" stroke="none" />
        <circle cx="37" cy="26" r="2.6" fill="#F07A5C" stroke="none" />
        <circle cx="26" cy="32" r="1.6" fill="#1A1A1A" stroke="none" />
        <circle cx="38" cy="32" r="1.6" fill="#1A1A1A" stroke="none" />
        <path d="M30 40 L34 40 L32 43 Z" fill="#F07A5C" stroke="#F07A5C" stroke-width="1.2" />
        <path d="M32 43 Q29 46 27 45" />
        <path d="M32 43 Q35 46 37 45" />
        <path d="M8 42 L20 41" />
        <path d="M8 47 L20 45" />
        <path d="M56 42 L44 41" />
        <path d="M56 47 L44 45" />
      </svg>
    </div>
    <div class="header-title" style="flex: 1;">
      <h1>Gemini Chat Backup</h1>
      <p>自動備份對話到本地 Markdown</p>
    </div>
    <div class="lang-selector">
      <button class="lang-btn" id="lang-toggle" title="Switch language">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M2 12h20"></path>
          <path d="M12 2a14 14 0 0 1 0 20"></path>
          <path d="M12 2a14 14 0 0 0 0 20"></path>
        </svg>
      </button>
      <div class="lang-dropdown" id="lang-dropdown"></div>
    </div>
  </div>

  <div class="body">

    <!-- 資料夾設定 -->
    <div class="folder-card">
      <div class="folder-status">
        <span class="status-dot" id="folder-dot"></span>
        <span id="folder-name">尚未選擇資料夾</span>
        <span id="folder-badge" class="folder-badge unset">未設定</span>
      </div>
      <div class="folder-actions">
        <button id="btn-select-folder" class="btn btn-outline" style="flex:1;">
          選擇資料夾
        </button>
        <button id="btn-reauth" class="btn btn-outline" style="flex:1;display:none;">
          重新授權
        </button>
      </div>
    </div>

    <!-- 立即備份 — 唯一的珊瑚色 CTA -->
    <button id="btn-backup" class="btn btn-primary">
      立即備份
    </button>

    <!-- 當前對話同步狀態 -->
    <div class="card" id="current-chat-card" style="display:none;">
      <div class="card-title" id="title-current-chat">當前對話狀態</div>
      <div class="sync-status-row">
        <span id="sync-status-badge" class="sync-badge never">未同步</span>
        <span id="sync-status-time"></span>
      </div>
    </div>

    <!-- 設定 -->
    <div class="card">
      <div class="card-title" id="title-settings">設定</div>
      <div class="row">
        <label class="row-label" for="interval-select">自動備份</label>
        <select id="interval-select">
          <option value="0">關閉</option>
          <option value="1">每 1 小時</option>
          <option value="4">每 4 小時</option>
          <option value="8">每 8 小時</option>
          <option value="24">每天（24 小時）</option>
        </select>
      </div>
      <div class="last-backup-row" style="margin-top: 10px;">
        <span>上次備份</span>
        <span id="last-backup-time">—</span>
      </div>
    </div>

    <!-- 歷史備份 -->
    <div class="card">
      <div class="card-title" id="title-history">歷史備份</div>
      <div class="history-controls">
        <div class="history-row">
          <label class="row-label" for="full-backup-limit">備份範圍</label>
          <select id="full-backup-limit">
            <option value="0">全部</option>
            <option value="5">前 5 個</option>
            <option value="10">前 10 個</option>
            <option value="20">前 20 個</option>
            <option value="30">前 30 個</option>
          </select>
        </div>
        <button id="btn-full-backup" class="btn btn-outline" style="margin-top: 8px;">
          同步所有歷史
        </button>
        <button id="btn-stop-backup" class="btn btn-ghost" style="display:none; margin-top: 6px;">
          停止備份
        </button>
        <button id="btn-retry-failed" class="btn btn-outline" style="display:none; margin-top: 6px;">
          重試失敗項目
        </button>
        <div id="full-backup-progress" style="display:none; margin-top: 10px;">
          <div class="progress-text" id="progress-text">準備中…</div>
          <div class="progress-current" id="progress-current"></div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <div id="failed-list" style="display:none; margin-top:8px;"></div>
        </div>
      </div>
    </div>

    <!-- 狀態訊息 -->
    <div id="status-msg"></div>

  </div>

  <div class="footer">
    Manifest V3 · File System Access API
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
